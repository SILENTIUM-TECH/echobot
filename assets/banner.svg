<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050506"/>
      <stop offset="100%" stop-color="#0f1a17"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c9a7"/>
      <stop offset="50%" stop-color="#2de8ca"/>
      <stop offset="100%" stop-color="#00c9a7"/>
      <animate attributeName="x1" values="-1;1;-1" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2;0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="220" fill="url(#bg)"/>

  <!-- pulsing signal rings -->
  <g opacity="0.5">
    <circle cx="90" cy="110" r="18" fill="none" stroke="#00c9a7" stroke-width="2">
      <animate attributeName="r" values="18;70;18" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="110" r="10" fill="#00c9a7">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- scanning line -->
  <rect x="0" y="0" width="3" height="220" fill="#2de8ca" opacity="0.6" filter="url(#soft)">
    <animate attributeName="x" values="0;897;0" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- title -->
  <text x="160" y="105" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="46" font-weight="800" fill="url(#glow)" letter-spacing="4">
    ECHO OBLIVION
  </text>
  <text x="162" y="140" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="15" fill="#9a9aa1" letter-spacing="3">
    ⚡ SILENTIUM TECHIES · WHATSAPP AI SYSTEM
  </text>

  <!-- typing cursor -->
  <rect x="700" y="120" width="12" height="20" fill="#00c9a7">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- bottom hairline -->
  <rect x="0" y="217" width="900" height="2" fill="#00c9a7" opacity="0.3"/>
</svg>
